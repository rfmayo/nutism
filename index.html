<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eye Quiz 👀</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
  }

  h1 {
    font-size: 1.8rem;
  }

  #quiz-image {
    width: 100%;
    max-width: 320px;
    height: auto;
    margin: 20px auto;
    display: block;
    border-radius: 12px;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 400px;
    margin: 0 auto;
  }

  .answers button {
    padding: 14px;
    font-size: 1rem;
    border-radius: 10px;
    border: none;
    background: #f0f0f0;
    cursor: pointer;
  }

  .answers button:active {
    background: #ddd;
  }

  #start-btn {
    padding: 14px 20px;
    font-size: 1.1rem;
    border-radius: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
  }

  #progress {
    margin-top: 10px;
    font-size: 0.9rem;
    color: #666;
  }

  #result {
    margin-top: 20px;
    font-size: 1.2rem;
  }
</style>
</head>
<body>

<h1>Whose eyes are these?</h1>
<p>The Adult Nutism Disorder Test consists of 36 photographs, each giving you four choices.</p>
<p>For each set of eyes, choose which nu metal icon you think they belong to.</p>
<button id="start-btn" onclick="startQuiz()">Aaare yoouu reeadyyyy?</button>
<p id="progress"></p>

<img id="quiz-image" src="" style="display:none;">
<div class="answers" id="answers"></div>
<p id="result"></p>

<div class="answers" id="answers"></div>

<p id="result"></p>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1t5DHEy-rbKRCe_dDvsmU0m-N5V2UwWMp5Heuf72xlfA/Sheet1";

let data = [];
let questions = [];
let currentIndex = 0;
let score = 0;
let currentCorrect = null;

function startQuiz() {
  document.getElementById("start-btn").style.display = "none";
  document.getElementById("quiz-image").style.display = "block";

  currentIndex = 0;
  score = 0;

  nextQuestion();
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function getWrongAnswers(correct) {
  let pool = data.filter(p =>
    p.Name !== correct.Name &&
    p.Band !== correct.Band
  );

  return shuffle(pool).slice(0, 3);
}

function nextQuestion() {
  // End of quiz
  if (currentIndex >= questions.length) {
    showFinalScore();
    return;
  }

  const correct = questions[currentIndex];
  currentCorrect = correct;

  const wrongAnswers = getWrongAnswers(correct);
  const options = shuffle([correct, ...wrongAnswers]);

  document.getElementById("quiz-image").src = correct["Image URL"];

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  options.forEach(option => {
    const btn = document.createElement("button");
    btn.textContent = option.Name;

    btn.onclick = () => {
      // Update score silently
      if (option.Name === currentCorrect.Name) {
        score++;
      }

      currentIndex++;
      nextQuestion();
    };

    answersDiv.appendChild(btn);
  });
}

function showFinalScore() {
  document.getElementById("quiz-image").style.display = "none";
  document.getElementById("answers").innerHTML = "";

  let message = "";

 if (score <= 20) {
  message = "You're so Blind, Douchbag";
} else if (score <= 30) {
  message = "You're a Counterfeit – Take A Look Around and try again";
} else {
  message = "Life Is Peachy when you're a nu metal Elite";
}

  document.getElementById("result").textContent =
    `You scored ${score} out of ${questions.length}! ${message}`;

  // Restart button
  document.getElementById("answers").innerHTML =
    '<button onclick="location.reload()">Play Again</button>';
}

loadData();
</script>

</body>
</html>
