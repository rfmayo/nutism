<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eye Quiz 👀</title>
  <style>
    body { font-family: Arial; text-align: center; }
    img { max-width: 300px; margin: 20px; }
    .answers button {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
    }
  </style>
</head>
<body>

<h1>Whose Eyes Are These?</h1>

<img id="quiz-image" src="" alt="Eyes">

<div class="answers" id="answers"></div>

<p id="result"></p>

<button onclick="nextQuestion()">Next Question</button>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1t5DHEy-rbKRCe_dDvsmU0m-N5V2UwWMp5Heuf72xlfA/Sheet1";

let data = [];
let questions = [];
let currentIndex = 0;
let score = 0;
let currentCorrect = null;

async function loadData() {
  const res = await fetch(SHEET_URL);
  data = await res.json();

  // Shuffle once → ensures no repeats
  questions = shuffle([...data]);

  nextQuestion();
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function getWrongAnswers(correct) {
  let pool = data.filter(p =>
    p.Name !== correct.Name &&
    p.Band !== correct.Band
  );

  return shuffle(pool).slice(0, 3);
}

function nextQuestion() {
  // End of quiz
  if (currentIndex >= questions.length) {
    showFinalScore();
    return;
  }

  const correct = questions[currentIndex];
  currentCorrect = correct;

  const wrongAnswers = getWrongAnswers(correct);
  const options = shuffle([correct, ...wrongAnswers]);

  document.getElementById("quiz-image").src = correct["Image URL"];

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  options.forEach(option => {
    const btn = document.createElement("button");
    btn.textContent = option.Name;

    btn.onclick = () => {
      // Update score silently
      if (option.Name === currentCorrect.Name) {
        score++;
      }

      currentIndex++;
      nextQuestion();
    };

    answersDiv.appendChild(btn);
  });
}

function showFinalScore() {
  document.getElementById("quiz-image").style.display = "none";
  document.getElementById("answers").innerHTML = "";
  
  document.getElementById("result").textContent =
    `You scored ${score} out of ${questions.length}! 🎉`;
}

loadData();
</script>

</body>
</html>
